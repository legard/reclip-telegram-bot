name: Test, Build and Push Docker Images

on:
  pull_request:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install -r reclip/requirements.txt -r bot/requirements.txt -r dashboard/requirements.txt
          python -m pip install pytest pytest-asyncio pyyaml httpx

      - name: Run ReClip tests
        run: python -m pytest reclip/tests -v

      - name: Run bot tests
        run: python -m pytest bot/tests -v

      - name: Run dashboard tests
        run: python -m pytest dashboard/tests -v

      - name: Validate CI configuration
        run: python -m pytest .github/tests -v

  build-and-push:
    needs: test
    if: ${{ github.event_name == 'release' && !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [reclip, bot, dashboard]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository
        id: repo
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.service }}
          push: true
          platforms: linux/amd64
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ steps.repo.outputs.repo }}/${{ matrix.service }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ steps.repo.outputs.repo }}/${{ matrix.service }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
